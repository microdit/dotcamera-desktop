<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DotCamera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #status-msg {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            font-size: 14px;
            pointer-events: none;
            z-index: 1000;
        }
        #error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,0,0,0.2);
            color: #fff;
            padding: 40px;
            font-family: monospace;
            white-space: pre-wrap;
            display: none;
            z-index: 9999;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="status-msg">초기화 중...</div>
    <div id="error-overlay"></div>
    <canvas id="c"></canvas>
    
    <script>
        // 전역 에러 핸들러
        window.onerror = function(msg, url, line, col, error) {
            const overlay = document.getElementById('error-overlay');
            overlay.style.display = 'block';
            overlay.innerHTML += `\n❌ ERROR: ${msg}\nAt: ${url}:${line}:${col}\n${error ? error.stack : ''}\n`;
            return false;
        };

        const status = document.getElementById('status-msg');
        function log(msg) {
            console.log(msg);
            status.innerHTML = msg;
        }
    </script>
    <script src="swissgl.js"></script>
    <script>
        const canvas = document.getElementById('c');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        if (typeof SwissGL === 'undefined') {
            throw new Error('SwissGL 라이브러리를 로드할 수 없습니다. swissgl.js 파일이 같은 디렉토리에 있는지 확인하세요.');
        }

        const glsl = SwissGL(canvas);
        
        class DotCamera {
            constructor(glsl) {
                this.tmp = glsl({}, {size:[1,1], tag:'tmp'});
                this.field = this.tmp;
                
                this.video = document.createElement('video');
                this.video.setAttribute('playsinline', '');
                this.video.muted = true;
                this.video.autoplay = true;
                this.video.style.cssText = 'position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;';
                document.body.appendChild(this.video);
                
                this.video.onloadedmetadata = () => {
                    log(`Metadata: ${this.video.videoWidth}x${this.video.videoHeight}`);
                };
                
                this.video.onplay = () => {
                    log('비디오 재생 시작 (readyState: ' + this.video.readyState + ')');
                };
                
                this.video.onplaying = () => {
                    log('비디오 재생 중... (readyState: ' + this.video.readyState + ', videoWidth: ' + this.video.videoWidth + ')');
                };
                
                this.video.onerror = (e) => {
                    log(`비디오 오류: ${this.video.error ? this.video.error.message : '알 수 없음'}`);
                };
                
                log('카메라 요청 중...');
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    log('❌ 보안 오류: HTTPS 주소나 localhost로 접속해야 카메라를 사용할 수 있습니다.');
                    throw new Error('Insecure Context: Camera access denied.');
                }
                
                navigator.mediaDevices.enumerateDevices().then(devices => {
                    const videoDevices = devices.filter(d => d.kind === 'videoinput');
                    log(`検出されたカメラ: ${videoDevices.length}台`);
                    videoDevices.forEach((d, i) => log(`  ${i}: ${d.label || 'カメラ'+i}`));
                });
                
                const constraints = { 
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 30 }
                    }, 
                    audio: false 
                };
                
                navigator.mediaDevices.getUserMedia(constraints)
                    .then((stream) => {
                        log('카메라 스트림 획득 성공');
                        this.video.srcObject = stream;
                        this.video.play().catch(e => log(`재생 실패: ${e.message}`));
                    }).catch((error) => {
                        log(`❌ 카메라 접근 실패: ${error.name} - ${error.message}`);
                        
                        if (error.name === 'NotReadableError') {
                            log('재시도: 다른 카메라 지정...');
                            navigator.mediaDevices.getUserMedia({
                                video: { 
                                    deviceId: { exact: undefined },
                                    width: { ideal: 640 },
                                    height: { ideal: 480 }
                                },
                                audio: false
                            }).then(s => {
                                this.video.srcObject = s;
                                this.video.play();
                            }).catch(e2 => {
                                log(`재시도 실패: ${e2.message}`);
                            });
                        }
                    });
            }

            calcForceField(glsl) {
                if (this.video.readyState < 1) {
                    return this.tmp;
                }
                
                const w = this.video.videoWidth;
                const h = this.video.videoHeight;
                
                if (w === 0 || h === 0) {
                    return this.tmp;
                }
                
                const tex = glsl({}, {size:[w, h], data:this.video, tag:'video'});
                log(`텍스처 생성: ${w}x${h}, readyState: ${this.video.readyState}`);
                
                let lum = glsl({tex, FP:`dot(tex(1.0-UV).rgb, vec3(0.21,0.72,0.07))`}, {size:tex.size, wrap:'clamp', tag:'lum'});
                const levels = {lum0:lum};
                for (let i=1; i<=6; ++i) {
                    levels[`lum${i}`] = lum = glsl({T:lum, FP: `
                        vec2 d = T_step()*0.8;
                        FOut.r = 0.25 * (T(UV+d).r + T(UV-d).r + T(UV+vec2(d.x,-d.y)).r + T(UV+vec2(-d.x,d.y)).r);
                    `}, {size:lum.size, scale:1/2, wrap:'clamp', tag:`lum${i}`});
                }
                const merged = glsl({...levels, FP:`
                    sqrt((lum0(UV).r+lum1(UV).r+lum2(UV).r+lum3(UV).r+lum4(UV).r+lum5(UV).r+lum6(UV).r)/7.0)`},
                    {size:tex.size, format:'r16f', wrap:'clamp', tag:'merged'});
                const grad = glsl({T:merged, FP:`
                    vec2 s=T_step();
                    float a=T(UV-s).r, b=T(UV+vec2(s.x,-s.y)).r, c=T(UV+vec2(-s.x,s.y)).r, d=T(UV+s).r;
                    FOut = vec4(b+d-a-c, c+d-a-b, 0, 0);`},
                    {size:tex.size, format:'rgba16f', tag:'grad'});
                return grad;
            }

            frame(glsl, {canvasSize}) {
                const arg = {canvasSize};
                const imgForce = this.calcForceField(glsl);

                let points;
                for (let i=0; i<10; ++i) {
                    points = glsl({...arg, field:this.field, imgForce, seed: Math.random()*124237, FP: `
                        vec4 p=Src(I), f=field(p.xy);;
                        if (p.w == 0.0) {
                            FOut = vec4(hash(ivec3(I, seed)).xy, 0.0, 1.0);
                            return;
                        }
                        if (f.z>1.9) {p.xy += 0.2*(hash(ivec3(I,seed)).xy-0.5)/canvasSize;}
                        vec2 force = f.xy*10.0 + imgForce(p.xy).xy*20.0;
                        p.xy = clamp(p.xy + force/canvasSize, vec2(0), vec2(1));
                        FOut = p;
                    `}, {scale:1/8, story:2, format:'rgba32f', tag:'points'});

                    this.field = glsl({...arg, points:points[0], Grid: points[0].size, Blend:'s+d', Clear:0, VP:`
                        VOut.xy = (points(ID.xy).xy + XY*15.0/canvasSize)*2.0-1.0;
                    `, FP:`vec3(XY,1.)*exp(-dot(XY,XY)*vec3(4,4,8)),0`}, {scale:1/4, format:'rgba16f', tag:'field'})
                }

                glsl({...arg, points:points[0], Grid: points[0].size, Blend:'s+d', VP:`
                    VOut.xy = (points(ID.xy).xy + XY*4.0/canvasSize)*2.0-1.0;
                `, FP:`exp(-dot(XY,XY)*3.0)`})
            }
        }

        const demo = new DotCamera(glsl);

        function render(t) {
            demo.frame(glsl, {canvasSize: [canvas.width, canvas.height]});
            requestAnimationFrame(render);
        }
        requestAnimationFrame(render);
    </script>
</body>
</html>
